 basics:{name:'Tree Basics',tag:'Core',subtitle:'Understand nodes, edges, root, leaf, height, depth, and recursion base.',badges:['Root','Leaf','Height','Depth','Subtree'],concept:`<ul><li>A tree is a hierarchical data structure.</li><li>Every node can have children.</li><li>Binary tree means each node has max two children.</li><li>Most tree problems are solved using recursion.</li></ul>`,notes:`<ul><li>Always handle <b>root == NULL</b>.</li><li>Think: what should this node return to its parent?</li><li>Tree recursion usually means solve left subtree, solve right subtree, combine answer.</li></ul>`,viz:'tree',actions:[['Show Terms','animateBasics']],c:`typedef struct Node {

 segment:{name:'Segment Tree',tag:'Range',subtitle:'Range query and update structure.',badges:['Range Sum','Range Min','Update','Lazy'],concept:`<ul><li>Segment tree answers range queries fast.</li><li>Build O(n), query O(log n), update O(log n).</li><li>Use when array changes and queries continue.</li></ul>`,notes:`<ul><li>For static range sum, prefix sum is simpler.</li><li>For updates + queries, segment tree is powerful.</li><li>Lazy propagation handles range updates.</li></ul>`,viz:'array',actions:[['Build','segBuild'],['Query [1,3]','segQuery'],['Update i=2','segUpdate']],c:`// Segment tree query idea
int query(node, start, end, l, r) {
    if (r < start || end < l)
        return 0;

    if (l <= start && end <= r)
        return tree[node];

    int mid = (start + end) / 2;
    return query(leftChild, start, mid, l, r) +
           query(rightChild, mid + 1, end, l, r);
}`,pseudo:`Build:
    leaf = array value
    internal node = left + right

Query:
    no overlap -> return 0
    full overlap -> return node value
    partial -> query both sides

Update:
    update leaf
    recompute ancestors`,problems:`Segment tree problems:
1. Range Sum Query Mutable
2. Count of Smaller Numbers After Self
3. Range Minimum Query
4. My Calendar problems
5. Falling Squares
6. Lazy Propagation problems`},

function renderTopics(){const q=document.getElementById('search').value.toLowerCase();const list=document.getElementById('topicList');const mobile=document.getElementById('mobileTopic');list.innerHTML='';mobile.innerHTML='';Object.entries(topics).forEach(([id,t])=>{if(q && !(t.name.toLowerCase().includes(q)||t.tag.toLowerCase().includes(q)))return;const b=document.createElement('button');b.className='topic '+(id===current?'active':'');b.onclick=()=>loadTopic(id);b.innerHTML=`<span>${t.name}</span><span class="tag">${t.tag}</span>`;list.appendChild(b);const o=document.createElement('option');o.value=id;o.textContent=t.name;if(id===current)o.selected=true;mobile.appendChild(o)});mobile.onchange=e=>loadTopic(e.target.value)}
function loadTopic(id){stopAnim();current=id;codeMode='c';const t=topics[id];document.getElementById('topicTitle').textContent=t.name;document.getElementById('topicSubtitle').textContent=t.subtitle;document.getElementById('badges').innerHTML=t.badges.map(x=>`<span class="badge">${x}</span>`).join('');document.getElementById('concept').innerHTML=t.concept;document.getElementById('notes').innerHTML=t.notes;document.getElementById('controls').innerHTML=t.actions.map(a=>`<button class="${a[1].includes('Reset')?'danger':'primary'}" onclick="doAction('${a[1]}')">${a[0]}</button>`).join('')+'<button onclick="resetCurrent()">Reset</button>';renderViz(t.viz);showCode('c');setStatus('Ready: '+t.name);renderTopics()}
function showCode(mode){codeMode=mode;['tabC','tabP','tabProblems'].forEach(id=>document.getElementById(id).classList.remove('active'));document.getElementById(mode==='c'?'tabC':mode==='pseudo'?'tabP':'tabProblems').classList.add('active');document.getElementById('codeBox').textContent=topics[current][mode]}
function renderViz(type){const s=document.getElementById('stage');if(type==='tree'){s.innerHTML='<svg class="treeSvg" id="treeSvg" viewBox="0 0 760 410"></svg>';drawTree()}else if(type==='array'){s.innerHTML='<div class="arr" id="arrViz"></div><div class="textviz" id="arrayNote"></div>';renderArray(current==='heap'?[9,5,6,2,3]:[2,1,5,3,4])}else if(type==='trie'){s.innerHTML='<div class="textviz" id="trieViz">root</div>'}else if(type==='text'){s.innerHTML='<div class="textviz" id="textViz">Preorder: 1,2,4,5,3\nInorder : 4,2,5,1,3\n\nClick animation to see construction idea.</div>'}else if(type==='roadmap'){s.innerHTML='<div class="arr" id="roadmapViz"></div>';renderRoadmap([])} }
function drawTree(){const svg=document.getElementById('treeSvg');if(!svg)return;svg.innerHTML='';baseEdges.forEach(([a,b])=>{const [x1,y1]=baseNodes[a], [x2,y2]=baseNodes[b];svg.innerHTML+=`<line class="edge" id="e${a}-${b}" x1="${x1}" y1="${y1+28}" x2="${x2}" y2="${y2-28}"/>`});Object.entries(baseNodes).forEach(([v,[x,y]])=>{svg.innerHTML+=`<g class="node" id="n${v}"><circle cx="${x}" cy="${y}" r="31"></circle><text x="${x}" y="${y}">${v}</text></g>`})}
function resetCurrent(){stopAnim();renderViz(topics[current].viz);setStatus('Reset done. Ready: '+topics[current].name)}
function node(v){return document.getElementById('n'+v)}function edge(a,b){return document.getElementById('e'+a+'-'+b)}
async function mark(v,msg,token){if(token!==animToken)return false;const n=node(v);if(!n)return true;n.classList.add('active');setStatus(msg);await sleep(550);if(token!==animToken)return false;n.classList.remove('active');n.classList.add('visited');return true}
async function doAction(action){stopAnim();const token=++animToken;setBar(0);if(action.startsWith('runOrder:'))return runOrder(action.split(':')[1],token);if(action==='animateBasics')return animateBasics(token);if(action==='bstSearch')return bstSearch(token);if(action==='bstInsert')return bstInsert(token);if(action==='bstDelete')return bstDelete(token);if(action==='bstValidate')return bstValidate(token);if(action==='heightAnim')return heightAnim(token);if(action==='diameterAnim')return diameterAnim(token);if(action==='balanceAnim')return balanceAnim(token);if(action.startsWith('lca:')){const[,a,b]=action.split(':');return lcaAnim(+a,+b,token)}if(action==='rootLeafAnim')return rootLeafAnim(token);if(action==='maxPathAnim')return maxPathAnim(token);if(action==='pathSumAnim')return pathSumAnim(token);if(action.startsWith('view:'))return viewAnim(action.split(':')[1],token);if(action==='buildTreeAnim')return buildTreeAnim(token);if(action==='serializeAnim')return serializeAnim(token);if(action.startsWith('trie:'))return trieInsert(action.split(':')[1],token);if(action.startsWith('trieSearch:'))return trieSearch(action.split(':')[1],token);if(action==='trieReset')return resetTrie();if(action==='heapify')return heapify(token);if(action==='extractMin')return extractMin(token);if(action==='heapInsert')return heapInsert(token);if(action==='segBuild')return segBuild(token);if(action==='segQuery')return segQuery(token);if(action==='segUpdate')return segUpdate(token);if(action==='roadmapAnim')return roadmapAnim(token)}
async function animateBasics(token){renderViz('tree');const labels=[[50,'Root node'],[20,'Leaf node'],[40,'Leaf node'],[70,'Parent node'],[60,'Child node']];for(let i=0;i<labels.length;i++){if(!await mark(labels[i][0],labels[i][1],token))return;setBar((i+1)/labels.length*100)}setStatus('Tree basics complete: root, parent, child, leaf, edge, subtree.')}
async function runOrder(type,token){renderViz('tree');const orders={inorder:[20,30,40,50,60,70,80],preorder:[50,30,20,40,70,60,80],postorder:[20,40,30,60,80,70,50],bfs:[50,30,70,20,40,60,80]};let out=[];for(let i=0;i<orders[type].length;i++){const v=orders[type][i];if(!await mark(v,`${type.toUpperCase()} visiting ${v}<br>Output: ${out.join(' → ')}`,token))return;out.push(v);setBar((i+1)/orders[type].length*100)}setStatus(`<b>${type.toUpperCase()} output:</b> ${out.join(' → ')}`)}
async function bstSearch(token){renderViz('tree');const path=[50,70,60];for(let i=0;i<path.length;i++){const v=path[i];if(!await mark(v,`Search 60: compare with ${v}`,token))return;if(i<path.length-1){const e=edge(v,path[i+1]);if(e)e.classList.add('active')}setBar((i+1)/path.length*100)}node(60).classList.add('target');setStatus('Found 60. Path: 50 → 70 → 60.')}
async function bstInsert(token){renderViz('tree');const path=[50,70,60];for(let i=0;i<path.length;i++){if(!await mark(path[i],`Insert 65: compare with ${path[i]}`,token))return;setBar((i+1)/4*100)}const svg=document.getElementById('treeSvg');svg.innerHTML+=`<line class="edge active" x1="450" y1="304" x2="505" y2="350"/><g class="node active" id="n65"><circle cx="520" cy="374" r="31"></circle><text x="520" y="374">65</text></g>`;setBar(100);setStatus('65 inserted as right child of 60.')}
async function bstDelete(token){renderViz('tree');node(70).classList.add('target');setStatus('Delete 70: node has two children. Need inorder successor.');await sleep(900);if(token!==animToken)return;node(80).classList.add('active');setStatus('Inorder successor of 70 is 80: smallest value in right subtree.');await sleep(900);if(token!==animToken)return;node(70).querySelector('text').textContent='80';node(80).classList.add('dim');setStatus('Replace 70 with 80, then remove old 80 leaf.');setBar(100)}
async function bstValidate(token){renderViz('tree');const path=[50,30,20,40,70,60,80];for(let i=0;i<path.length;i++){if(!await mark(path[i],`Validate BST bounds at node ${path[i]}`,token))return;setBar((i+1)/path.length*100)}setStatus('BST valid: every node follows min/max range, not only local child rule.')}
async function heightAnim(token){renderViz('tree');const levels=[[50],[30,70],[20,40,60,80]];for(let i=0;i<levels.length;i++){for(const v of levels[i])node(v).classList.add('active');setStatus('Height calculation: visiting level '+(i+1));await sleep(700);if(token!==animToken)return;for(const v of levels[i]){node(v).classList.remove('active');node(v).classList.add('visited')}setBar((i+1)/levels.length*100)}setStatus('Height = 3 nodes, or 2 edges depending on definition.')}
async function diameterAnim(token){renderViz('tree');const p=[20,30,50,70,80];for(let i=0;i<p.length;i++){if(!await mark(p[i],`Diameter path candidate: ${p.slice(0,i+1).join(' → ')}`,token))return;setBar((i+1)/p.length*100)}setStatus('Diameter path: 20 → 30 → 50 → 70 → 80. Length = 4 edges.')}
async function balanceAnim(token){renderViz('tree');const order=[20,40,30,60,80,70,50];for(let i=0;i<order.length;i++){if(!await mark(order[i],`Postorder balance check at ${order[i]}`,token))return;setBar((i+1)/order.length*100)}setStatus('Balanced: every node has |left height - right height| ≤ 1.')}
async function lcaAnim(a,b,token){renderViz('tree');node(a).classList.add('target');node(b).classList.add('target');const ans=(a===20&&b===40)?30:(a===60&&b===80)?70:50;setStatus(`Find LCA(${a}, ${b}). Search left and right subtrees.`);await sleep(800);if(token!==animToken)return;node(ans).classList.add('active');setBar(100);setStatus(`LCA(${a}, ${b}) = ${ans}. This is the lowest node where both targets meet.`)}
async function rootLeafAnim(token){renderViz('tree');const p=[50,30,20];for(let i=0;i<p.length;i++){if(!await mark(p[i],`Backtracking path: ${p.slice(0,i+1).join(' → ')}`,token))return;setBar((i+1)/p.length*100)}setStatus('Root-to-leaf path found: 50 → 30 → 20. Then recursion backtracks.')}
async function maxPathAnim(token){renderViz('tree');const p=[20,30,50,70,80];for(let i=0;i<p.length;i++){if(!await mark(p[i],`Max path candidate includes ${p[i]}`,token))return;setBar((i+1)/p.length*100)}setStatus('Max path uses left + root + right at a turning node, but returns only one side upward.')}
async function pathSumAnim(token){renderViz('tree');const p=[50,30,20];let sum=0;for(let i=0;i<p.length;i++){sum+=p[i];if(!await mark(p[i],`Path sum so far = ${sum}`,token))return;setBar((i+1)/p.length*100)}setStatus('Path 50 + 30 + 20 = 100 found.')}
async function viewAnim(type,token){renderViz('tree');let vals={left:[50,30,20],right:[50,70,80],top:[20,30,50,70,80],vertical:[20,30,40,50,60,70,80]}[type];for(let i=0;i<vals.length;i++){if(!await mark(vals[i],`${type} view selects/checks ${vals[i]}`,token))return;setBar((i+1)/vals.length*100)}setStatus(`${type.toUpperCase()} view result: ${vals.join(' → ')}`)}
async function buildTreeAnim(token){renderViz('text');const lines=['Preorder root = 1','Find 1 in inorder','Left inorder = 4,2,5','Right inorder = 3','Recursively build left and right subtrees','Tree construction complete'];for(let i=0;i<lines.length;i++){document.getElementById('textViz').textContent=lines.slice(0,i+1).join('\n');setStatus(lines[i]);setBar((i+1)/lines.length*100);await sleep(750);if(token!==animToken)return}}
async function serializeAnim(token){renderViz('text');const seq=['1','2','NULL','NULL','3','NULL','NULL'];for(let i=0;i<seq.length;i++){document.getElementById('textViz').textContent='Serialized preorder:\n'+seq.slice(0,i+1).join(',');setStatus('Writing '+seq[i]);setBar((i+1)/seq.length*100);await sleep(500);if(token!==animToken)return}setStatus('Serialization needs NULL markers to preserve exact shape.')}
let trieWords=[];function trieText(){let root={};for(const w of trieWords){let cur=root;for(const ch of w){cur[ch]=cur[ch]||{};cur=cur[ch]}cur['$']={}}function rec(obj,ind){let s='';for(const k of Object.keys(obj).sort()){s+=ind+k+(k==='$'?'  (end)':'')+'\n';s+=rec(obj[k],ind+'  ')}return s}return 'root\n'+rec(root,'  ')}async function trieInsert(w,token){for(let i=0;i<w.length;i++){setStatus(`Insert ${w}: create/follow '${w[i]}'`);setBar((i+1)/w.length*85);await sleep(450);if(token!==animToken)return}if(!trieWords.includes(w))trieWords.push(w);document.getElementById('trieViz').textContent=trieText();setBar(100);setStatus(`${w} inserted. isEnd marked at final character.`)}async function trieSearch(w,token){for(let i=0;i<w.length;i++){setStatus(`Search ${w}: checking '${w[i]}'`);setBar((i+1)/w.length*100);await sleep(450);if(token!==animToken)return}setStatus(trieWords.includes(w)?`${w} found.`:`${w} not found. Insert it first.`)}function resetTrie(){trieWords=[];renderViz('trie');setStatus('Trie reset.')} 
function renderArray(arr,active=[],done=[]){const el=document.getElementById('arrViz');if(!el)return;el.innerHTML=arr.map((v,i)=>`<div class="box ${active.includes(i)?'active':''} ${done.includes(i)?'done':''}">${v}</div>`).join('')}let heap=[9,5,6,2,3];async function heapify(token){heap=[9,5,6,2,3];renderArray(heap);const swaps=[[0,1],[1,3],[0,1]];for(let i=0;i<swaps.length;i++){const[a,b]=swaps[i];renderArray(heap,[a,b]);setStatus(`Heapify: compare ${heap[a]} and ${heap[b]}`);setBar((i+1)/swaps.length*80);await sleep(800);if(token!==animToken)return;if(heap[a]>heap[b])[heap[a],heap[b]]=[heap[b],heap[a]];renderArray(heap,[a,b]);await sleep(450)}renderArray(heap,[],heap.map((_,i)=>i));setBar(100);setStatus('Min heap ready: '+heap.join(', '))}async function extractMin(token){await heapify(token);if(token!==animToken)return;await sleep(400);setStatus('Extract min = '+heap[0]);renderArray(heap,[0]);await sleep(700);if(token!==animToken)return;heap[0]=heap.pop();renderArray(heap,[0]);setStatus('Move last element to root, then heapify down.');await sleep(700);if(heap[0]>heap[1])[heap[0],heap[1]]=[heap[1],heap[0]];renderArray(heap,[],heap.map((_,i)=>i));setStatus('After extract min: '+heap.join(', '));setBar(100)}async function heapInsert(token){heap=[2,3,6,9,5];renderArray(heap);await sleep(400);heap.push(1);renderArray(heap,[5]);setStatus('Insert 1 at end, then bubble up.');await sleep(800);if(token!==animToken)return;[heap[5],heap[2]]=[heap[2],heap[5]];renderArray(heap,[2,5]);await sleep(700);[heap[2],heap[0]]=[heap[0],heap[2]];renderArray(heap,[],heap.map((_,i)=>i));setStatus('1 bubbled up to root.');setBar(100)}
let seg=[2,1,5,3,4];async function segBuild(token){seg=[2,1,5,3,4];renderArray(seg);const steps=['Build leaves from original array','Combine [0,1] = 3','Combine [2,4] = 12','Root sum [0,4] = 15'];for(let i=0;i<steps.length;i++){setStatus(steps[i]);setBar((i+1)/steps.length*100);await sleep(700);if(token!==animToken)return}}async function segQuery(token){renderArray(seg,[1,2,3]);setStatus('Query [1,3]: visit only useful ranges. Sum = 1 + 5 + 3 = 9.');setBar(100)}async function segUpdate(token){renderArray(seg,[2]);setStatus('Update index 2 from 5 to 10.');await sleep(800);if(token!==animToken)return;seg[2]=10;renderArray(seg,[2]);setStatus('Ancestors recomputed. New total = 20.');setBar(100)}
function renderRoadmap(active=[]){const arr=['DFS','BFS','BST','LCA','Paths','Build','Trie','Heap','Segment'];document.getElementById('roadmapViz').innerHTML=arr.map((v,i)=>`<div class="box ${active.includes(i)?'active':''} ${active.length>i?'done':''}" style="width:88px">${v}</div>`).join('')}async function roadmapAnim(token){for(let i=0;i<9;i++){renderRoadmap([i]);setStatus('Practice phase '+(i+1));setBar((i+1)/9*100);await sleep(500);if(token!==animToken)return}setStatus('Roadmap complete: revise patterns, then solve mixed problems.')}
